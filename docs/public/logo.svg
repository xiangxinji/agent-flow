<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3eaf7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42b883;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" opacity="0.1"/>
  
  <!-- Flow lines -->
  <path d="M 40 100 Q 70 60 100 100 T 160 100" stroke="url(#gradient)" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 40 120 Q 70 80 100 120 T 160 120" stroke="url(#gradient)" stroke-width="3" fill="none" opacity="0.4"/>
  
  <!-- Nodes -->
  <circle cx="40" cy="100" r="12" fill="url(#gradient)"/>
  <circle cx="100" cy="100" r="12" fill="url(#gradient)"/>
  <circle cx="160" cy="100" r="12" fill="url(#gradient)"/>
  
  <!-- Node highlights -->
  <circle cx="40" cy="100" r="6" fill="white" opacity="0.8"/>
  <circle cx="100" cy="100" r="6" fill="white" opacity="0.8"/>
  <circle cx="160" cy="100" r="6" fill="white" opacity="0.8"/>
  
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#gradient)">AF</text>
</svg>
